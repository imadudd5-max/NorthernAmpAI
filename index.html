<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NorthernAmpAI</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      color-scheme: light;
      /* Light mode colors */
      --bg-primary: #ffffff;
      --bg-secondary: #f7f7f7;
      --bg-tertiary: #ececf1;
      --text-primary: #0d0d0d;
      --text-secondary: #565869;
      --text-tertiary: #8e8ea0;
      --border-color: #d1d5db;
      --message-user-bg: #10a37f;
      --message-ai-bg: #f7f7f8;
      --message-user-text: #ffffff;
      --message-ai-text: #0d0d0d;
      --button-hover: #e6e6eb;
      --sidebar-bg: #ffffff;
      --input-bg: #ffffff;
      --primary: #10a37f;
      --primary-hover: #0d8f6f;
    }

    html.dark-mode {
      color-scheme: dark;
      /* Dark mode colors */
      --bg-primary: #0d0d0d;
      --bg-secondary: #1a1a1a;
      --bg-tertiary: #2a2a2a;
      --text-primary: #ececf1;
      --text-secondary: #c5c5d2;
      --text-tertiary: #8e8ea0;
      --border-color: #404854;
      --message-user-bg: #10a37f;
      --message-ai-bg: #2a2a2a;
      --message-user-text: #ffffff;
      --message-ai-text: #ececf1;
      --button-hover: #373737;
      --sidebar-bg: #1a1a1a;
      --input-bg: #2a2a2a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    .app-shell {
      display: grid;
      grid-template-columns: 260px 1fr;
      min-height: 100vh;
      gap: 0;
      align-items: stretch;
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 0;
      padding: 16px;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border-color);
      overflow-y: auto;
    }

    .brand {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 0 0 20px 0;
      border-bottom: 1px solid var(--border-color);
      margin-bottom: 16px;
    }

    .brand h1 {
      margin: 0;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text-primary);
    }

    .brand p {
      margin: 0;
      font-size: 0.85rem;
      color: var(--text-tertiary);
    }

    .card {
      margin-bottom: 20px;
    }

    .card h2 {
      margin: 0 0 12px;
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: 0;
      text-transform: uppercase;
      font-size: 0.9rem;
      color: var(--text-tertiary);
    }

    .project-list,
    .history-list,
    .chat-list {
      display: grid;
      gap: 4px;
    }

    .project-item,
    .history-item,
    .chat-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 12px;
      border-radius: 8px;
      background: transparent;
      border: 1px solid transparent;
      color: var(--text-primary);
      cursor: pointer;
      transition: background-color 0.2s ease;
      font-size: 0.95rem;
      text-align: left;
    }

    .project-item:hover,
    .history-item:hover,
    .chat-item:hover {
      background: var(--button-hover);
    }

    .project-item.active,
    .chat-item.active {
      background: rgba(16, 163, 127, 0.15);
      color: var(--primary);
    }

    .project-item span,
    .history-item span,
    .chat-item span {
      color: var(--text-primary);
      font-size: 0.95rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .project-item-wrapper {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      width: 100%;
      overflow: hidden;
    }

    .delete-project-btn {
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: background 0.2s ease, color 0.2s ease;
      font-size: 1rem;
      line-height: 1;
      flex-shrink: 0;
    }

    .delete-project-btn:hover {
      background: rgba(239, 68, 68, 0.1);
      color: #ef4444;
    }

    .create-project-btn {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      background: transparent;
      color: var(--text-primary);
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }

    .create-project-btn:hover {
      background: var(--button-hover);
    }

    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal-dialog {
      background: var(--bg-primary);
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      width: 90%;
      max-width: 400px;
      z-index: 1001;
    }

    .modal-dialog h3 {
      margin: 0 0 16px 0;
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--text-primary);
    }

    .modal-dialog input {
      width: 100%;
      padding: 11px 12px;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      font-size: 0.95rem;
      margin-bottom: 16px;
      box-sizing: border-box;
      background: var(--input-bg);
      color: var(--text-primary);
      transition: border-color 0.2s ease;
    }

    .modal-dialog input:focus {
      outline: none;
      border-color: var(--primary);
    }

    .modal-buttons {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }

    .modal-btn {
      padding: 10px 16px;
      border-radius: 8px;
      border: none;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .modal-btn.primary {
      background: var(--primary);
      color: white;
    }

    .modal-btn.primary:hover {
      background: var(--primary-hover);
    }

    .modal-btn.secondary {
      background: var(--button-hover);
      color: var(--text-primary);
      border: 1px solid var(--border-color);
    }

    .modal-btn.secondary:hover {
      background: var(--bg-tertiary);
    }

    .new-chat-btn {
      width: 100%;
      padding: 11px 14px;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      background: transparent;
      color: var(--text-primary);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s ease;
      margin-bottom: 16px;
    }

    .new-chat-btn:hover {
      background: var(--button-hover);
    }

    .chat-panel {
      display: flex;
      flex-direction: column;
      border-radius: 0;
      background: var(--bg-primary);
      border: none;
      box-shadow: none;
      overflow: hidden;
      min-height: 100vh;
    }

    .header-bar {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      background: var(--bg-primary);
    }

    .header-bar h1 {
      margin: 0;
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text-primary);
    }

    .header-bar p {
      margin: 0;
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    .theme-toggle {
      background: transparent;
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      cursor: pointer;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 1rem;
      transition: background 0.2s ease;
      margin-left: auto;
    }

    .theme-toggle:hover {
      background: var(--button-hover);
    }

    .chat-window {
      flex: 1;
      overflow-y: auto;
      padding: 24px 40px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      background: var(--bg-primary);
      max-width: 900px;
      margin: 0 auto;
      width: 100%;
    }

    .message {
      display: flex;
      gap: 12px;
      width: 100%;
      margin: 0;
      overflow-wrap: anywhere;
    }

    .message.ai {
      justify-content: flex-start;
    }

    .message.user {
      justify-content: flex-end;
    }

    .message-content {
      max-width: 70%;
      padding: 12px 16px;
      border-radius: 12px;
    }

    .message.ai .message-content {
      background: var(--message-ai-bg);
      color: var(--message-ai-text);
      border: 1px solid var(--border-color);
    }

    .message.user .message-content {
      background: var(--message-user-bg);
      color: var(--message-user-text);
    }

    .message .label {
      display: none;
    }

    .message .content {
      font-size: 0.95rem;
      line-height: 1.6;
      color: inherit;
      margin: 0;
    }

    .message pre {
      background: #0f172a;
      border-radius: 8px;
      color: #f8fafc;
      padding: 12px;
      overflow-x: auto;
      font-family: Menlo, Consolas, Monaco, 'Andale Mono', 'Ubuntu Mono', monospace;
      font-size: 0.85rem;
      line-height: 1.5;
      margin: 8px 0 0 0;
    }

    .message table {
      width: 100%;
      border-collapse: collapse;
      margin: 12px 0;
      font-size: 0.9rem;
    }

    .message table th,
    .message table td {
      border: 1px solid var(--border-color);
      padding: 10px 12px;
      text-align: left;
    }

    .message table th {
      background: var(--bg-tertiary);
      font-weight: 700;
    }

    .message blockquote {
      margin: 12px 0;
      padding: 12px 16px;
      border-left: 3px solid var(--primary);
      background: var(--bg-secondary);
      color: var(--text-primary);
    }

    .message code {
      background: var(--bg-secondary);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: Menlo, Consolas, Monaco, 'Andale Mono', 'Ubuntu Mono', monospace;
      font-size: 0.9em;
    }

    .footer-bar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: end;
      border-top: 1px solid var(--border-color);
      padding: 16px 24px 24px;
      background: var(--bg-primary);
      max-width: 900px;
      margin: 0 auto;
      width: 100%;
    }

    .input-wrapper {
      display: grid;
      gap: 8px;
    }

    textarea#prompt {
      width: 100%;
      min-height: 100px;
      max-height: 300px;
      border-radius: 12px;
      border: 1px solid var(--border-color);
      padding: 12px 16px;
      resize: vertical;
      font-size: 0.95rem;
      line-height: 1.5;
      color: var(--text-primary);
      background: var(--input-bg);
      font-family: inherit;
      transition: border-color 0.2s ease;
      outline: none;
    }

    textarea#prompt:focus {
      border-color: var(--primary);
    }

    .send-button {
      padding: 10px 16px;
      border-radius: 8px;
      border: none;
      background: var(--primary);
      color: white;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: none;
      transition: background 0.2s ease;
      align-self: stretch;
      min-height: 40px;
    }

    .send-button:hover {
      background: var(--primary-hover);
    }

    .send-button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .status-line {
      color: var(--text-tertiary);
      font-size: 0.85rem;
      margin-top: 4px;
      min-height: 18px;
    }

    .small-note {
      font-size: 0.85rem;
      color: var(--text-tertiary);
    }

    @media (max-width: 1080px) {
      .app-shell {
        grid-template-columns: 1fr;
      }

      .sidebar {
        border-right: none;
        border-bottom: 1px solid var(--border-color);
      }
    }

    @media (max-width: 720px) {
      .app-shell {
        grid-template-columns: 1fr;
      }

      .chat-window {
        padding: 16px 12px;
      }

      .footer-bar {
        padding: 12px 12px 16px;
        grid-template-columns: 1fr;
      }

      .send-button {
        width: 100%;
      }

      .message-content {
        max-width: 100%;
      }

      textarea#prompt {
        min-height: 80px;
      }

      .sidebar {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="modal-overlay" id="projectModal">
    <div class="modal-dialog">
      <h3>Create New Project</h3>
      <input type="text" id="projectNameInput" placeholder="Enter project name..." />
      <div class="modal-buttons">
        <button class="modal-btn secondary" id="cancelBtn">Cancel</button>
        <button class="modal-btn primary" id="confirmBtn">Create</button>
      </div>
    </div>
  </div>

  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div>
          <h1>NorthernAmpAI</h1>
          <p>Engineering AI workspace</p>
        </div>
        <button class="new-chat-btn" id="newChatBtn">+ New Chat</button>
      </div>

      <section class="card">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
          <h2 style="margin: 0;">Projects</h2>
          <button class="create-project-btn" id="createProjectBtn" title="Add a new project">+</button>
        </div>
        <div class="project-list" id="projectList"></div>
      </section>

      <section class="card">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
          <h2 style="margin: 0;">Chats in <span id="currentProjectTitle">Project</span></h2>
          <button class="create-project-btn" id="createChatBtn" title="Add a new chat">+</button>
        </div>
        <div class="chat-list" id="chatList"></div>
      </section>
    </aside>

    <main class="chat-panel">
      <div class="header-bar">
        <div>
          <h1>NorthernAmpAI</h1>
          <p>Professional electrical engineering assistant.</p>
        </div>
        <button class="theme-toggle" id="themeToggle" title="Toggle dark mode">🌙</button>
      </div>

      <section class="chat-window" id="chatWindow"></section>

      <div class="footer-bar">
        <div class="input-wrapper">
          <textarea id="prompt" placeholder="Type your question here..." rows="4"></textarea>
          <div class="status-line" id="statusLine">Press Enter to send, Shift + Enter for a new line.</div>
        </div>
        <button class="send-button" id="sendBtn">Send</button>
      </div>
    </main>
  </div>

  <script>
    const API_URL = "https://oh4xf4eo5i.execute-api.us-east-1.amazonaws.com/prod/NorthernAmpAI";
    const PRESIGN_API_URL = "http://localhost:3000/presign-upload";
    const STORAGE_KEY_PREFIX = "NorthernAmpAI_conversation_";
    const CHATS_KEY_PREFIX = "NorthernAmpAI_chats_";
    const PROJECTS_KEY = "NorthernAmpAI_projects";
    const SELECTED_PROJECT_KEY = "NorthernAmpAI_selected_project";
    const SELECTED_CHAT_KEY = "NorthernAmpAI_selected_chat";
    
    const defaultProjects = [
      "General Engineering",
      "Transformers",
      "Protection & Control",
      "SCADA",
      "Power Studies",
      "Reports"
    ];

    let selectedProject = defaultProjects[0];
    let selectedChatId = null;
    let chats = {}; // { projectName: [ { id, title, conversation } ] }

    const chatWindow = document.getElementById("chatWindow");
    const promptInput = document.getElementById("prompt");
    const sendBtn = document.getElementById("sendBtn");
    const newChatBtn = document.getElementById("newChatBtn");
    const statusLine = document.getElementById("statusLine");
    const projectList = document.getElementById("projectList");
    const chatList = document.getElementById("chatList");
    const currentProjectTitle = document.getElementById("currentProjectTitle");
    const projectModal = document.getElementById("projectModal");
    const projectNameInput = document.getElementById("projectNameInput");
    const createProjectBtn = document.getElementById("createProjectBtn");
    const createChatBtn = document.getElementById("createChatBtn");
    const confirmBtn = document.getElementById("confirmBtn");
    const cancelBtn = document.getElementById("cancelBtn");

    let conversation = [];
    let projects = [];
    let isThinking = false;
    let isDarkMode = localStorage.getItem('theme') === 'dark';

    const createMessage = (role, text) => ({ role, text, timestamp: new Date().toISOString() });

    // Initialize theme
    function initTheme() {
      const themeToggle = document.getElementById('themeToggle');
      if (isDarkMode) {
        document.documentElement.classList.add('dark-mode');
        themeToggle.textContent = '☀️';
      } else {
        document.documentElement.classList.remove('dark-mode');
        themeToggle.textContent = '🌙';
      }
      themeToggle.addEventListener('click', toggleTheme);
    }

    function toggleTheme() {
      isDarkMode = !isDarkMode;
      localStorage.setItem('theme', isDarkMode ? 'dark' : 'light');
      document.documentElement.classList.toggle('dark-mode');
      const themeToggle = document.getElementById('themeToggle');
      themeToggle.textContent = isDarkMode ? '☀️' : '🌙';
    }

    function renderProjects() {
      projectList.innerHTML = projects
        .map((project) => `
          <div class="project-item${project === selectedProject ? " active" : ""}" data-project="${escapeHtml(project)}">
            <div class="project-item-wrapper">
              <span>${project}</span>
              <button class="delete-project-btn" data-project="${escapeHtml(project)}" title="Delete project">×</button>
            </div>
          </div>
        `)
        .join("");
      
      document.querySelectorAll(".project-item").forEach(item => {
        item.addEventListener("click", () => {
          switchProject(item.dataset.project);
        });
      });

      document.querySelectorAll(".delete-project-btn").forEach(btn => {
        btn.addEventListener("click", (e) => {
          e.stopPropagation();
          deleteProject(btn.dataset.project);
        });
      });
    }

    function renderChats() {
      const projectChats = chats[selectedProject] || [];
      chatList.innerHTML = projectChats
        .map((chat) => `
          <div class="chat-item${chat.id === selectedChatId ? " active" : ""}" data-chat-id="${chat.id}">
            <div class="project-item-wrapper">
              <span>${escapeHtml(chat.title)}</span>
              <button class="delete-project-btn" data-chat-id="${chat.id}" title="Delete chat">×</button>
            </div>
          </div>
        `)
        .join("");
      
      document.querySelectorAll(".chat-item").forEach(item => {
        item.addEventListener("click", () => {
          switchChat(item.dataset.chatId);
        });
      });

      document.querySelectorAll(".delete-project-btn[data-chat-id]").forEach(btn => {
        btn.addEventListener("click", (e) => {
          e.stopPropagation();
          deleteChat(btn.dataset.chatId);
        });
      });
    }

    function renderConversation() {
      chatWindow.innerHTML = conversation
        .map((msg) => {
          const content = msg.role === "assistant" ? marked.parse(msg.text) : `<div>${escapeHtml(msg.text).replace(/\n/g, "<br />")}</div>`;
          return `
            <article class="message ${msg.role}">
              <div class="message-content">
                <div class="content">${content}</div>
              </div>
            </article>
          `;
        })
        .join("");
      chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function getConversationKey(projectName) {
      return `${STORAGE_KEY_PREFIX}${projectName}`;
    }

    function getChatsKey(projectName) {
      return `${CHATS_KEY_PREFIX}${projectName}`;
    }

    function saveSelectedProject() {
      localStorage.setItem(SELECTED_PROJECT_KEY, selectedProject);
    }

    function saveSelectedChat() {
      localStorage.setItem(SELECTED_CHAT_KEY, selectedChatId);
    }

    function saveConversation() {
      if (!selectedProject || !selectedChatId) return;
      const projectChats = chats[selectedProject] || [];
      const chat = projectChats.find(c => c.id === selectedChatId);
      if (chat) {
        chat.conversation = conversation;
        saveChats();
      }
    }

    function saveChats() {
      if (!selectedProject) return;
      localStorage.setItem(getChatsKey(selectedProject), JSON.stringify(chats[selectedProject] || []));
    }

    function sanitizeForS3(value) {
      return value
        .toLowerCase()
        .trim()
        .replace(/[^a-z0-9-_\.]/g, "_")
        .replace(/_+/g, "_");
    }

    async function saveChatToS3(projectName, conversationData) {
      if (!projectName || !conversationData || conversationData.length === 0) {
        return false;
      }

      const timestamp = new Date().toISOString().replace(/[:.]/g, "-");
      const safeProject = sanitizeForS3(projectName);
      const fileName = `chat_${safeProject}_${timestamp}.json`;
      const payload = {
        projectName,
        savedAt: new Date().toISOString(),
        conversation: conversationData
      };

      try {
        const response = await fetch(PRESIGN_API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ projectName, fileName })
        });

        if (!response.ok) {
          throw new Error(`Presign request failed (${response.status})`);
        }

        const { uploadUrl, objectKey } = await response.json();
        const uploadResponse = await fetch(uploadUrl, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        if (!uploadResponse.ok) {
          throw new Error(`S3 upload failed (${uploadResponse.status})`);
        }

        return true;
      } catch (error) {
        console.warn("S3 save failed:", error);
        return false;
      }
    }

    function loadChats() {
      if (!selectedProject) return;
      const stored = localStorage.getItem(getChatsKey(selectedProject));
      if (stored) {
        try {
          chats[selectedProject] = JSON.parse(stored);
        } catch (error) {
          chats[selectedProject] = [];
        }
      } else {
        chats[selectedProject] = [];
      }
    }

    function loadCurrentChat() {
      if (!selectedProject || !selectedChatId) {
        conversation = [createMessage("assistant", "Hello! I'm NorthernAmpAI. Ask me about transformer sizing, protection design, SCADA, power studies, or engineering reports.")];
        return;
      }
      const projectChats = chats[selectedProject] || [];
      const chat = projectChats.find(c => c.id === selectedChatId);
      if (chat) {
        conversation = chat.conversation || [];
      } else {
        conversation = [createMessage("assistant", "Hello! I'm NorthernAmpAI. Ask me about transformer sizing, protection design, SCADA, power studies, or engineering reports.")];
      }
      if (!conversation || conversation.length === 0) {
        conversation = [createMessage("assistant", "Hello! I'm NorthernAmpAI. Ask me about transformer sizing, protection design, SCADA, power studies, or engineering reports.")];
      }
    }

    function switchProject(projectName) {
      if (!projectName || selectedProject === projectName) return;
      selectedProject = projectName;
      saveSelectedProject();
      loadChats();
      const projectChats = chats[selectedProject] || [];
      if (projectChats.length === 0) {
        // Create a default chat for new projects
        const chatId = Date.now().toString();
        const defaultChat = {
          id: chatId,
          title: "Welcome",
          conversation: [createMessage("assistant", "Hello! I'm NorthernAmpAI. Ask me about transformer sizing, protection design, SCADA, power studies, or engineering reports.")]
        };
        chats[selectedProject] = [defaultChat];
        saveChats();
        selectedChatId = chatId;
      } else if (projectChats.length > 0) {
        selectedChatId = projectChats[0].id;
      } else {
        selectedChatId = null;
      }
      saveSelectedChat();
      loadCurrentChat();
      currentProjectTitle.textContent = selectedProject;
      renderProjects();
      renderChats();
      renderConversation();
      updateStatus(`Switched to project: ${selectedProject}`);
    }

    function switchChat(chatId) {
      if (!chatId || selectedChatId === chatId) return;
      selectedChatId = chatId;
      saveSelectedChat();
      loadCurrentChat();
      renderChats();
      renderConversation();
      updateStatus(`Switched to chat: ${chats[selectedProject].find(c => c.id === chatId).title}`);
    }

    function loadSession() {
      const storedProjects = localStorage.getItem(PROJECTS_KEY);
      const storedSelectedProject = localStorage.getItem(SELECTED_PROJECT_KEY);
      const storedSelectedChat = localStorage.getItem(SELECTED_CHAT_KEY);

      if (storedProjects) {
        try {
          projects = JSON.parse(storedProjects);
        } catch (error) {
          projects = [...defaultProjects];
        }
      } else {
        projects = [...defaultProjects];
      }

      if (storedSelectedProject && projects.includes(storedSelectedProject)) {
        selectedProject = storedSelectedProject;
      } else if (projects.length > 0) {
        selectedProject = projects[0];
      }

      loadChats();
      const projectChats = chats[selectedProject] || [];
      if (storedSelectedChat && projectChats.some(c => c.id === storedSelectedChat)) {
        selectedChatId = storedSelectedChat;
      } else if (projectChats.length > 0) {
        selectedChatId = projectChats[0].id;
      } else {
        selectedChatId = null;
      }

      loadCurrentChat();
      currentProjectTitle.textContent = selectedProject;

      renderConversation();
      renderProjects();
      renderChats();
    }

    function updateStatus(text) {
      statusLine.textContent = text;
    }

    function openProjectModal() {
      projectModal.classList.add("active");
      projectNameInput.value = "";
      projectNameInput.focus();
    }

    function closeProjectModal() {
      projectModal.classList.remove("active");
    }

    function createProject(projectName) {
      const trimmedName = projectName.trim();
      if (!trimmedName) {
        alert("Please enter a project name.");
        return;
      }
      
      if (projects.includes(trimmedName)) {
        alert("A project with this name already exists.");
        projectNameInput.focus();
        return;
      }
      
      projects.push(trimmedName);
      chats[trimmedName] = [];
      saveProjects();
      switchProject(trimmedName);
      closeProjectModal();
    }

    function deleteProject(projectName) {
      if (projects.length === 1) {
        alert("At least one project must remain.");
        return;
      }

      if (confirm(`Are you sure you want to delete "${projectName}"? This will delete all chats in the project.`)) {
        projects = projects.filter(p => p !== projectName);
        delete chats[projectName];
        localStorage.removeItem(getChatsKey(projectName));
        if (selectedProject === projectName) {
          selectedProject = projects[0];
          saveSelectedProject();
          loadChats();
          const projectChats = chats[selectedProject] || [];
          selectedChatId = projectChats.length > 0 ? projectChats[0].id : null;
          saveSelectedChat();
          loadCurrentChat();
          currentProjectTitle.textContent = selectedProject;
        }
        saveProjects();
        renderProjects();
        renderChats();
        renderConversation();
      }
    }

    function createChat() {
      if (!selectedProject) return;
      const chatId = Date.now().toString();
      const newChat = {
        id: chatId,
        title: "New Chat",
        conversation: [createMessage("assistant", "New chat started. How can NorthernAmpAI support your engineering task?")]
      };
      if (!chats[selectedProject]) chats[selectedProject] = [];
      chats[selectedProject].push(newChat);
      saveChats();
      switchChat(chatId);
    }

    function deleteChat(chatId) {
      if (!selectedProject || !chatId) return;
      const projectChats = chats[selectedProject] || [];
      if (projectChats.length === 1) {
        alert("At least one chat must remain in the project.");
        return;
      }
      if (confirm("Are you sure you want to delete this chat?")) {
        chats[selectedProject] = projectChats.filter(c => c.id !== chatId);
        if (selectedChatId === chatId) {
          const remaining = chats[selectedProject];
          selectedChatId = remaining.length > 0 ? remaining[0].id : null;
          saveSelectedChat();
          loadCurrentChat();
        }
        saveChats();
        renderChats();
        renderConversation();
      }
    }

    async function sendQuestion() {
      if (isThinking) return;
      const question = promptInput.value.trim();
      if (!question) return;

      isThinking = true;
      promptInput.value = "";
      updateStatus("Sending question...");
      appendMessage("user", question);
      appendMessage("assistant", "Thinking...");

      try {
        const response = await fetch(API_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ question })
        });

        const payload = await response.json();
        let body = payload;
        if (payload.body) {
          try {
            body = JSON.parse(payload.body);
          } catch (_) {
            body = payload.body;
          }
        }

        const answer = body.answer || body.message || "No answer returned from the API.";
        replaceLastAssistantMessage(answer);
        saveConversation();
        const savedToS3 = await saveChatToS3(selectedProject, conversation);
        // Update chat title if it's the first user message
        if (selectedProject && selectedChatId) {
          const projectChats = chats[selectedProject] || [];
          const chat = projectChats.find(c => c.id === selectedChatId);
          if (chat && chat.title === "New Chat") {
            chat.title = question.length > 50 ? question.substring(0, 50) + "..." : question;
            saveChats();
            renderChats();
          }
        }
        if (savedToS3) {
          updateStatus("Answer received and chat saved to S3. Press Enter to ask the next question.");
        } else {
          updateStatus("Answer received. Chat saved locally; S3 upload failed.");
        }
      } catch (error) {
        replaceLastAssistantMessage(`Error: ${error.message}`);
        updateStatus("Unable to connect to the API. Check your network or endpoint.");
      } finally {
        isThinking = false;
      }
    }

    function appendMessage(role, text) {
      conversation.push(createMessage(role, text));
      saveConversation();
      renderConversation();
    }

    function replaceLastAssistantMessage(text) {
      for (let i = conversation.length - 1; i >= 0; i--) {
        if (conversation[i].role === "assistant") {
          conversation[i].text = text;
          break;
        }
      }
      renderConversation();
      saveConversation();
    }

    function startNewChat() {
      createChat();
    }

    // Event listeners
    sendBtn.addEventListener("click", sendQuestion);
    newChatBtn.addEventListener("click", startNewChat);
    createProjectBtn.addEventListener("click", openProjectModal);
    createChatBtn.addEventListener("click", createChat);
    confirmBtn.addEventListener("click", () => createProject(projectNameInput.value));
    cancelBtn.addEventListener("click", closeProjectModal);

    projectNameInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        createProject(projectNameInput.value);
      } else if (e.key === "Escape") {
        closeProjectModal();
      }
    });

    promptInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        sendQuestion();
      }
    });

    // Close modal when clicking outside
    projectModal.addEventListener("click", (e) => {
      if (e.target === projectModal) {
        closeProjectModal();
      }
    });

    loadSession();
    initTheme();
  </script>
</body>
</html>
