<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NorthernAmpAI</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      color-scheme: light;
      font-family: Calibri, Arial, Helvetica, sans-serif;
      background: #eef2f7;
      color: #1f2937;
      --surface: #ffffff;
      --surface-soft: #f7f9fc;
      --surface-muted: #f1f5f9;
      --border: rgba(148, 163, 184, 0.3);
      --shadow: 0 18px 60px rgba(15, 23, 42, 0.08);
      --primary: #2563eb;
      --primary-soft: #e0ebff;
      --text-strong: #111827;
      --text-muted: #475569;
      --accent: #3b82f6;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top left, rgba(37, 99, 235, 0.12), transparent 28%),
        radial-gradient(circle at bottom right, rgba(56, 189, 248, 0.08), transparent 28%),
        var(--surface);
      color: var(--text-strong);
      font-family: Calibri, Arial, Helvetica, sans-serif;
    }

    .app-shell {
      display: grid;
      grid-template-columns: 320px 1fr;
      min-height: 100vh;
      gap: 24px;
      padding: 24px;
      align-items: stretch;
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 20px;
      padding: 24px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.98);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      min-height: calc(100vh - 48px);
    }

    .brand {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .brand h1 {
      margin: 0;
      font-size: 1.25rem;
      letter-spacing: -0.02em;
      color: var(--text-strong);
    }

    .brand p {
      margin: 0;
      font-size: 0.95rem;
      color: var(--text-muted);
    }

    .card {
      border-radius: 22px;
      background: var(--surface-soft);
      border: 1px solid var(--border);
      padding: 18px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.05);
    }

    .card h2 {
      margin: 0 0 16px;
      font-size: 1rem;
      color: var(--text-strong);
    }

    .project-list,
    .history-list {
      display: grid;
      gap: 10px;
    }

    .project-item,
    .history-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 16px;
      border-radius: 16px;
      background: #ffffff;
      border: 1px solid rgba(148, 163, 184, 0.16);
      color: var(--text-strong);
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }

    .project-item:hover,
    .history-item:hover {
      background: var(--surface-muted);
      transform: translateY(-1px);
    }

    .project-item span,
    .history-item span {
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    .create-project-btn {
      width: 32px;
      height: 32px;
      border-radius: 12px;
      border: none;
      background: var(--primary);
      color: white;
      font-size: 1.2rem;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }

    .create-project-btn:hover {
      background: #1d4ed8;
      transform: scale(1.05);
    }

    .project-item-wrapper {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .delete-project-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 8px;
      transition: background 0.2s ease, color 0.2s ease;
      font-size: 1.2rem;
      line-height: 1;
    }

    .delete-project-btn:hover {
      background: rgba(239, 68, 68, 0.1);
      color: #ef4444;
    }

    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal-dialog {
      background: white;
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 20px 60px rgba(15, 23, 42, 0.2);
      width: 90%;
      max-width: 400px;
      z-index: 1001;
    }

    .modal-dialog h3 {
      margin: 0 0 16px 0;
      font-size: 1.3rem;
      color: var(--text-strong);
    }

    .modal-dialog input {
      width: 100%;
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid rgba(148, 163, 184, 0.32);
      font-size: 1rem;
      margin-bottom: 16px;
      box-sizing: border-box;
    }

    .modal-dialog input:focus {
      outline: none;
      border-color: rgba(37, 99, 235, 0.45);
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.12);
    }

    .modal-buttons {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }

    .modal-btn {
      padding: 10px 16px;
      border-radius: 10px;
      border: none;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .modal-btn.primary {
      background: var(--primary);
      color: white;
    }

    .modal-btn.primary:hover {
      background: #1d4ed8;
    }

    .modal-btn.secondary {
      background: rgba(148, 163, 184, 0.1);
      color: var(--text-strong);
    }

    .modal-btn.secondary:hover {
      background: rgba(148, 163, 184, 0.2);
    }

    .new-chat-btn {
      width: 100%;
      padding: 14px 18px;
      border-radius: 16px;
      border: none;
      background: var(--primary);
      color: #ffffff;
      font-size: 0.98rem;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.2s ease;
    }

    .new-chat-btn:hover {
      background: #1d4ed8;
      transform: translateY(-1px);
    }

    .chat-panel {
      display: flex;
      flex-direction: column;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.98);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      overflow: hidden;
      min-height: calc(100vh - 48px);
    }

    .header-bar {
      padding: 24px 28px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.16);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      background: rgba(247, 250, 252, 0.95);
    }

    .header-bar h1 {
      margin: 0;
      font-size: 1.4rem;
      letter-spacing: -0.02em;
    }

    .header-bar p {
      margin: 0;
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    .chat-window {
      flex: 1;
      overflow-y: auto;
      padding: 24px 28px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      background: linear-gradient(180deg, #f8fafc 0%, #ffffff 100%);
    }

    .message {
      max-width: 85%;
      border-radius: 22px;
      padding: 18px;
      box-shadow: 0 12px 32px rgba(15, 23, 42, 0.06);
      border: 1px solid transparent;
      position: relative;
      overflow-wrap: anywhere;
    }

    .message.ai {
      align-self: flex-start;
      background: #f8fafc;
      border-color: rgba(59, 130, 246, 0.12);
    }

    .message.user {
      align-self: flex-end;
      background: #e0f2fe;
      border-color: rgba(3, 105, 161, 0.18);
    }

    .message .label {
      display: inline-flex;
      margin-bottom: 10px;
      font-size: 0.82rem;
      letter-spacing: 0.02em;
      color: var(--text-muted);
      text-transform: uppercase;
      font-weight: 700;
    }

    .message.ai .label {
      color: #2563eb;
    }

    .message.user .label {
      color: #0f172a;
    }

    .message .content {
      font-size: 1rem;
      line-height: 1.75;
      color: var(--text-strong);
    }

    .message pre {
      background: #0f172a;
      border-radius: 14px;
      color: #f8fafc;
      padding: 16px;
      overflow-x: auto;
      font-family: Consolas, Monaco, 'Andale Mono', 'Ubuntu Mono', monospace;
      font-size: 0.95rem;
    }

    .message table {
      width: 100%;
      border-collapse: collapse;
      margin: 14px 0;
    }

    .message table th,
    .message table td {
      border: 1px solid rgba(148, 163, 184, 0.3);
      padding: 12px 14px;
      text-align: left;
      font-size: 0.96rem;
    }

    .message table th {
      background: #eef2ff;
      font-weight: 700;
    }

    .message blockquote {
      margin: 16px 0;
      padding: 14px 18px;
      border-left: 4px solid rgba(37, 99, 235, 0.48);
      background: #eff6ff;
      color: #1e293b;
    }

    .footer-bar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: end;
      border-top: 1px solid rgba(148, 163, 184, 0.16);
      padding: 18px 24px;
      background: rgba(247, 250, 252, 0.95);
    }

    .input-wrapper {
      display: grid;
      gap: 10px;
    }

    textarea#prompt {
      width: 100%;
      min-height: 120px;
      border-radius: 18px;
      border: 1px solid rgba(148, 163, 184, 0.32);
      padding: 16px;
      resize: vertical;
      font-size: 1rem;
      line-height: 1.6;
      color: var(--text-strong);
      background: #ffffff;
      box-shadow: inset 0 0 0 1px rgba(148, 163, 184, 0.06);
      outline: none;
    }

    textarea#prompt:focus {
      border-color: rgba(37, 99, 235, 0.45);
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.12);
    }

    .send-button {
      padding: 16px 24px;
      border-radius: 18px;
      border: none;
      background: var(--primary);
      color: white;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 12px 20px rgba(37, 99, 235, 0.18);
      transition: transform 0.16s ease, background 0.16s ease;
      align-self: stretch;
    }

    .send-button:hover {
      background: #1d4ed8;
      transform: translateY(-1px);
    }

    .send-button:disabled {
      opacity: 0.65;
      cursor: not-allowed;
      transform: none;
    }

    .status-line {
      color: var(--text-muted);
      font-size: 0.92rem;
      margin-top: 4px;
      min-height: 20px;
    }

    .small-note {
      font-size: 0.93rem;
      color: var(--text-muted);
    }

    @media (max-width: 1080px) {
      .app-shell {
        grid-template-columns: 1fr;
      }

      .sidebar {
        min-height: auto;
      }
    }

    @media (max-width: 720px) {
      .app-shell {
        padding: 16px;
      }

      .sidebar,
      .chat-panel {
        border-radius: 20px;
      }

      .header-bar,
      .footer-bar,
      .chat-window {
        padding: 18px;
      }

      .footer-bar {
        grid-template-columns: 1fr;
      }

      textarea#prompt {
        min-height: 100px;
      }
    }
  </style>
</head>
<body>
  <div class="modal-overlay" id="projectModal">
    <div class="modal-dialog">
      <h3>Create New Project</h3>
      <input type="text" id="projectNameInput" placeholder="Enter project name..." />
      <div class="modal-buttons">
        <button class="modal-btn secondary" id="cancelBtn">Cancel</button>
        <button class="modal-btn primary" id="confirmBtn">Create</button>
      </div>
    </div>
  </div>

  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div>
          <h1>NorthernAmpAI</h1>
          <p>Engineering AI workspace</p>
        </div>
        <button class="new-chat-btn" id="newChatBtn">+ New Chat</button>
      </div>

      <section class="card">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
          <h2 style="margin: 0;">Projects</h2>
          <button class="create-project-btn" id="createProjectBtn" title="Add a new project">+</button>
        </div>
        <div class="project-list" id="projectList"></div>
      </section>

      <section class="card">
        <h2>Chat History</h2>
        <div class="history-list" id="historyList"></div>
      </section>
    </aside>

    <main class="chat-panel">
      <div class="header-bar">
        <div>
          <h1>NorthernAmpAI</h1>
          <p>Professional electrical engineering assistant with markdown-rich answers.</p>
        </div>
      </div>

      <section class="chat-window" id="chatWindow"></section>

      <div class="footer-bar">
        <div class="input-wrapper">
          <textarea id="prompt" placeholder="Type your question here..." rows="4"></textarea>
          <div class="status-line" id="statusLine">Press Enter to send, Shift + Enter for a new line.</div>
        </div>
        <button class="send-button" id="sendBtn">Send</button>
      </div>
    </main>
  </div>

  <script>
    const API_URL = "https://oh4xf4eo5i.execute-api.us-east-1.amazonaws.com/prod/NorthernAmpAI";
    const STORAGE_KEY = "NorthernAmpAI_conversation";
    const HISTORY_KEY = "NorthernAmpAI_history";
    const PROJECTS_KEY = "NorthernAmpAI_projects";
    
    const defaultProjects = [
      "General Engineering",
      "Transformers",
      "Protection & Control",
      "SCADA",
      "Power Studies",
      "Reports"
    ];

    const sampleHistory = [
      "Transformer sizing for 25 MW",
      "ANSI transformer sizes",
      "Grounding study assumptions",
      "Relay settings review"
    ];

    const chatWindow = document.getElementById("chatWindow");
    const promptInput = document.getElementById("prompt");
    const sendBtn = document.getElementById("sendBtn");
    const newChatBtn = document.getElementById("newChatBtn");
    const statusLine = document.getElementById("statusLine");
    const projectList = document.getElementById("projectList");
    const historyList = document.getElementById("historyList");
    const projectModal = document.getElementById("projectModal");
    const projectNameInput = document.getElementById("projectNameInput");
    const createProjectBtn = document.getElementById("createProjectBtn");
    const confirmBtn = document.getElementById("confirmBtn");
    const cancelBtn = document.getElementById("cancelBtn");

    let conversation = [];
    let history = [];
    let projects = [];
    let isThinking = false;

    const createMessage = (role, text) => ({ role, text, timestamp: new Date().toISOString() });

    function renderProjects() {
      projectList.innerHTML = projects
        .map((project) => `
          <div class="project-item">
            <div class="project-item-wrapper">
              <span>${project}</span>
              <button class="delete-project-btn" data-project="${escapeHtml(project)}" title="Delete project">×</button>
            </div>
          </div>
        `)
        .join("");
      
      // Add event listeners to delete buttons
      document.querySelectorAll(".delete-project-btn").forEach(btn => {
        btn.addEventListener("click", (e) => {
          e.stopPropagation();
          deleteProject(btn.dataset.project);
        });
      });
    }

    function renderHistory() {
      const combined = [...sampleHistory, ...history].slice(0, 10);
      historyList.innerHTML = combined
        .map((entry) => `
          <div class="history-item"><span>${entry}</span></div>
        `)
        .join("");
    }

    function renderConversation() {
      chatWindow.innerHTML = conversation
        .map((msg) => {
          const label = msg.role === "assistant" ? "NorthernAmpAI" : "You";
          const content = msg.role === "assistant" ? marked.parse(msg.text) : `<div>${escapeHtml(msg.text).replace(/\n/g, "<br />")}</div>`;
          return `
            <article class="message ${msg.role}">
              <span class="label">${label}</span>
              <div class="content">${content}</div>
            </article>
          `;
        })
        .join("");
      chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function saveConversation() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(conversation));
    }

    function saveHistory(item) {
      if (!item || history.includes(item) || sampleHistory.includes(item)) return;
      history.unshift(item);
      if (history.length > 10) history.length = 10;
      localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
      renderHistory();
    }

    function saveProjects() {
      localStorage.setItem(PROJECTS_KEY, JSON.stringify(projects));
    }

    function loadSession() {
      const stored = localStorage.getItem(STORAGE_KEY);
      const storedHistory = localStorage.getItem(HISTORY_KEY);
      const storedProjects = localStorage.getItem(PROJECTS_KEY);
      
      if (storedHistory) {
        try {
          history = JSON.parse(storedHistory);
        } catch (error) {
          history = [];
        }
      }
      
      if (storedProjects) {
        try {
          projects = JSON.parse(storedProjects);
        } catch (error) {
          projects = [...defaultProjects];
        }
      } else {
        projects = [...defaultProjects];
      }
      
      if (stored) {
        try {
          conversation = JSON.parse(stored);
        } catch (error) {
          conversation = [];
        }
      }

      if (!conversation || conversation.length === 0) {
        conversation = [
          createMessage("assistant", "Hello! I'm NorthernAmpAI. Ask me about transformer sizing, protection design, SCADA, power studies, or engineering reports.")
        ];
      }
      renderConversation();
      renderProjects();
      renderHistory();
    }

    function updateStatus(text) {
      statusLine.textContent = text;
    }

    function openProjectModal() {
      projectModal.classList.add("active");
      projectNameInput.value = "";
      projectNameInput.focus();
    }

    function closeProjectModal() {
      projectModal.classList.remove("active");
    }

    function createProject(projectName) {
      const trimmedName = projectName.trim();
      if (!trimmedName) {
        alert("Please enter a project name.");
        return;
      }
      
      if (projects.includes(trimmedName)) {
        alert("A project with this name already exists.");
        projectNameInput.focus();
        return;
      }
      
      projects.push(trimmedName);
      saveProjects();
      renderProjects();
      closeProjectModal();
    }

    function deleteProject(projectName) {
      if (confirm(`Are you sure you want to delete "${projectName}"?`)) {
        projects = projects.filter(p => p !== projectName);
        saveProjects();
        renderProjects();
      }
    }

    async function sendQuestion() {
      if (isThinking) return;
      const question = promptInput.value.trim();
      if (!question) return;

      isThinking = true;
      promptInput.value = "";
      updateStatus("Sending question...");
      appendMessage("user", question);
      appendMessage("assistant", "Thinking...");

      try {
        const response = await fetch(API_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ question })
        });

        const payload = await response.json();
        let body = payload;
        if (payload.body) {
          try {
            body = JSON.parse(payload.body);
          } catch (_) {
            body = payload.body;
          }
        }

        const answer = body.answer || body.message || "No answer returned from the API.";
        replaceLastAssistantMessage(answer);
        saveConversation();
        saveHistory(question);
        updateStatus("Answer received. Press Enter to ask the next question.");
      } catch (error) {
        replaceLastAssistantMessage(`Error: ${error.message}`);
        updateStatus("Unable to connect to the API. Check your network or endpoint.");
      } finally {
        isThinking = false;
      }
    }

    function appendMessage(role, text) {
      conversation.push(createMessage(role, text));
      saveConversation();
      renderConversation();
    }

    function replaceLastAssistantMessage(text) {
      for (let i = conversation.length - 1; i >= 0; i--) {
        if (conversation[i].role === "assistant") {
          conversation[i].text = text;
          break;
        }
      }
      renderConversation();
      saveConversation();
    }

    function startNewChat() {
      conversation = [
        createMessage("assistant", "New session started. How can NorthernAmpAI support your engineering task?")
      ];
      saveConversation();
      renderConversation();
      updateStatus("New chat created. Enter your question below.");
    }

    // Event listeners
    sendBtn.addEventListener("click", sendQuestion);
    newChatBtn.addEventListener("click", startNewChat);
    createProjectBtn.addEventListener("click", openProjectModal);
    confirmBtn.addEventListener("click", () => createProject(projectNameInput.value));
    cancelBtn.addEventListener("click", closeProjectModal);

    projectNameInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        createProject(projectNameInput.value);
      } else if (e.key === "Escape") {
        closeProjectModal();
      }
    });

    promptInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        sendQuestion();
      }
    });

    // Close modal when clicking outside
    projectModal.addEventListener("click", (e) => {
      if (e.target === projectModal) {
        closeProjectModal();
      }
    });

    loadSession();
  </script>
</body>
</html>
