<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NorthernAmpAI</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      color-scheme: light;
      font-family: Calibri, Arial, Helvetica, sans-serif;
      background: #eef2f7;
      color: #1f2937;
      --surface: #ffffff;
      --surface-soft: #f7f9fc;
      --surface-muted: #f1f5f9;
      --border: rgba(148, 163, 184, 0.3);
      --shadow: 0 18px 60px rgba(15, 23, 42, 0.08);
      --primary: #2563eb;
      --primary-soft: #e0ebff;
      --text-strong: #111827;
      --text-muted: #475569;
      --accent: #3b82f6;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top left, rgba(37, 99, 235, 0.12), transparent 28%),
        radial-gradient(circle at bottom right, rgba(56, 189, 248, 0.08), transparent 28%),
        var(--surface);
      color: var(--text-strong);
      font-family: Calibri, Arial, Helvetica, sans-serif;
    }

    .app-shell {
      display: grid;
      grid-template-columns: 320px 1fr;
      min-height: 100vh;
      gap: 24px;
      padding: 24px;
      align-items: stretch;
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 20px;
      padding: 24px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.98);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      min-height: calc(100vh - 48px);
    }

    .brand {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .brand h1 {
      margin: 0;
      font-size: 1.25rem;
      letter-spacing: -0.02em;
      color: var(--text-strong);
    }

    .brand p {
      margin: 0;
      font-size: 0.95rem;
      color: var(--text-muted);
    }

    .card {
      border-radius: 22px;
      background: var(--surface-soft);
      border: 1px solid var(--border);
      padding: 18px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.05);
    }

    .card h2 {
      margin: 0 0 16px;
      font-size: 1rem;
      color: var(--text-strong);
    }

    .project-list,
    .history-list,
    .chat-list {
      display: grid;
      gap: 10px;
    }

    .project-item,
    .history-item,
    .chat-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 16px;
      border-radius: 16px;
      background: #ffffff;
      border: 1px solid rgba(148, 163, 184, 0.16);
      color: var(--text-strong);
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }

    .project-item:hover,
    .history-item:hover,
    .chat-item:hover {
      background: var(--surface-muted);
      transform: translateY(-1px);
    }

    .project-item.active {
      background: rgba(37, 99, 235, 0.12);
      border-color: rgba(37, 99, 235, 0.28);
    }

    .chat-item.active {
      background: rgba(59, 130, 246, 0.14);
      border-color: rgba(59, 130, 246, 0.28);
    }

    .project-item span,
    .history-item span,
    .chat-item span {
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    .create-project-btn {
      width: 32px;
      height: 32px;
      border-radius: 12px;
      border: none;
      background: var(--primary);
      color: white;
      font-size: 1.2rem;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }

    .create-project-btn:hover {
      background: #1d4ed8;
      transform: scale(1.05);
    }

    .project-item-wrapper {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .delete-project-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 8px;
      transition: background 0.2s ease, color 0.2s ease;
      font-size: 1.2rem;
      line-height: 1;
    }

    .delete-project-btn:hover {
      background: rgba(239, 68, 68, 0.1);
      color: #ef4444;
    }

    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal-dialog {
      background: white;
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 20px 60px rgba(15, 23, 42, 0.2);
      width: 90%;
      max-width: 400px;
      z-index: 1001;
    }

    .modal-dialog h3 {
      margin: 0 0 16px 0;
      font-size: 1.3rem;
      color: var(--text-strong);
    }

    .modal-dialog input {
      width: 100%;
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid rgba(148, 163, 184, 0.32);
      font-size: 1rem;
      margin-bottom: 16px;
      box-sizing: border-box;
    }

    .modal-dialog input:focus {
      outline: none;
      border-color: rgba(37, 99, 235, 0.45);
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.12);
    }

    .modal-buttons {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }

    .modal-btn {
      padding: 10px 16px;
      border-radius: 10px;
      border: none;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .modal-btn.primary {
      background: var(--primary);
      color: white;
    }

    .modal-btn.primary:hover {
      background: #1d4ed8;
    }

    .modal-btn.secondary {
      background: rgba(148, 163, 184, 0.1);
      color: var(--text-strong);
    }

    .modal-btn.secondary:hover {
      background: rgba(148, 163, 184, 0.2);
    }

    .new-chat-btn {
      width: 100%;
      padding: 14px 18px;
      border-radius: 16px;
      border: none;
      background: var(--primary);
      color: #ffffff;
      font-size: 0.98rem;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.2s ease;
    }

    .new-chat-btn:hover {
      background: #1d4ed8;
      transform: translateY(-1px);
    }

    .chat-panel {
      display: flex;
      flex-direction: column;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.98);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      overflow: hidden;
      min-height: calc(100vh - 48px);
    }

    .header-bar {
      padding: 24px 28px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.16);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      background: rgba(247, 250, 252, 0.95);
    }

    .header-bar h1 {
      margin: 0;
      font-size: 1.4rem;
      letter-spacing: -0.02em;
    }

    .header-bar p {
      margin: 0;
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    .chat-window {
      flex: 1;
      overflow-y: auto;
      padding: 24px 28px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      background: linear-gradient(180deg, #f8fafc 0%, #ffffff 100%);
    }

    .message {
      max-width: 85%;
      border-radius: 22px;
      padding: 18px;
      box-shadow: 0 12px 32px rgba(15, 23, 42, 0.06);
      border: 1px solid transparent;
      position: relative;
      overflow-wrap: anywhere;
    }

    .message.ai {
      align-self: flex-start;
      background: #f8fafc;
      border-color: rgba(59, 130, 246, 0.12);
    }

    .message.user {
      align-self: flex-end;
      background: #e0f2fe;
      border-color: rgba(3, 105, 161, 0.18);
    }

    .message .label {
      display: inline-flex;
      margin-bottom: 10px;
      font-size: 0.82rem;
      letter-spacing: 0.02em;
      color: var(--text-muted);
      text-transform: uppercase;
      font-weight: 700;
    }

    .message.ai .label {
      color: #2563eb;
    }

    .message.user .label {
      color: #0f172a;
    }

    .message .content {
      font-size: 1rem;
      line-height: 1.75;
      color: var(--text-strong);
    }

    .message pre {
      background: #0f172a;
      border-radius: 14px;
      color: #f8fafc;
      padding: 16px;
      overflow-x: auto;
      font-family: Consolas, Monaco, 'Andale Mono', 'Ubuntu Mono', monospace;
      font-size: 0.95rem;
    }

    .message table {
      width: 100%;
      border-collapse: collapse;
      margin: 14px 0;
    }

    .message table th,
    .message table td {
      border: 1px solid rgba(148, 163, 184, 0.3);
      padding: 12px 14px;
      text-align: left;
      font-size: 0.96rem;
    }

    .message table th {
      background: #eef2ff;
      font-weight: 700;
    }

    .message blockquote {
      margin: 16px 0;
      padding: 14px 18px;
      border-left: 4px solid rgba(37, 99, 235, 0.48);
      background: #eff6ff;
      color: #1e293b;
    }

    .footer-bar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: end;
      border-top: 1px solid rgba(148, 163, 184, 0.16);
      padding: 18px 24px;
      background: rgba(247, 250, 252, 0.95);
    }

    .input-wrapper {
      display: grid;
      gap: 10px;
    }

    textarea#prompt {
      width: 100%;
      min-height: 120px;
      border-radius: 18px;
      border: 1px solid rgba(148, 163, 184, 0.32);
      padding: 16px;
      resize: vertical;
      font-size: 1rem;
      line-height: 1.6;
      color: var(--text-strong);
      background: #ffffff;
      box-shadow: inset 0 0 0 1px rgba(148, 163, 184, 0.06);
      outline: none;
    }

    textarea#prompt:focus {
      border-color: rgba(37, 99, 235, 0.45);
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.12);
    }

    .send-button {
      padding: 16px 24px;
      border-radius: 18px;
      border: none;
      background: var(--primary);
      color: white;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 12px 20px rgba(37, 99, 235, 0.18);
      transition: transform 0.16s ease, background 0.16s ease;
      align-self: stretch;
    }

    .send-button:hover {
      background: #1d4ed8;
      transform: translateY(-1px);
    }

    .send-button:disabled {
      opacity: 0.65;
      cursor: not-allowed;
      transform: none;
    }

    .status-line {
      color: var(--text-muted);
      font-size: 0.92rem;
      margin-top: 4px;
      min-height: 20px;
    }

    .small-note {
      font-size: 0.93rem;
      color: var(--text-muted);
    }

    @media (max-width: 1080px) {
      .app-shell {
        grid-template-columns: 1fr;
      }

      .sidebar {
        min-height: auto;
      }
    }

    @media (max-width: 720px) {
      .app-shell {
        padding: 16px;
      }

      .sidebar,
      .chat-panel {
        border-radius: 20px;
      }

      .header-bar,
      .footer-bar,
      .chat-window {
        padding: 18px;
      }

      .footer-bar {
        grid-template-columns: 1fr;
      }

      textarea#prompt {
        min-height: 100px;
      }
    }
  </style>
</head>
<body>
  <div class="modal-overlay" id="projectModal">
    <div class="modal-dialog">
      <h3>Create New Project</h3>
      <input type="text" id="projectNameInput" placeholder="Enter project name..." />
      <div class="modal-buttons">
        <button class="modal-btn secondary" id="cancelBtn">Cancel</button>
        <button class="modal-btn primary" id="confirmBtn">Create</button>
      </div>
    </div>
  </div>

  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div>
          <h1>NorthernAmpAI</h1>
          <p>Engineering AI workspace</p>
        </div>
        <button class="new-chat-btn" id="newChatBtn">+ New Chat</button>
      </div>

      <section class="card">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
          <h2 style="margin: 0;">Projects</h2>
          <button class="create-project-btn" id="createProjectBtn" title="Add a new project">+</button>
        </div>
        <div class="project-list" id="projectList"></div>
      </section>

      <section class="card">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
          <h2 style="margin: 0;">Chats in <span id="currentProjectTitle">Project</span></h2>
          <button class="create-project-btn" id="createChatBtn" title="Add a new chat">+</button>
        </div>
        <div class="chat-list" id="chatList"></div>
      </section>
    </aside>

    <main class="chat-panel">
      <div class="header-bar">
        <div>
          <h1>NorthernAmpAI</h1>
          <p>Professional electrical engineering assistant with markdown-rich answers.</p>
        </div>
      </div>

      <section class="chat-window" id="chatWindow"></section>

      <div class="footer-bar">
        <div class="input-wrapper">
          <textarea id="prompt" placeholder="Type your question here..." rows="4"></textarea>
          <div class="status-line" id="statusLine">Press Enter to send, Shift + Enter for a new line.</div>
        </div>
        <button class="send-button" id="sendBtn">Send</button>
      </div>
    </main>
  </div>

  <script>
    const API_URL = "https://oh4xf4eo5i.execute-api.us-east-1.amazonaws.com/prod/NorthernAmpAI";
    const PRESIGN_API_URL = "http://localhost:3000/presign-upload";
    const STORAGE_KEY_PREFIX = "NorthernAmpAI_conversation_";
    const CHATS_KEY_PREFIX = "NorthernAmpAI_chats_";
    const PROJECTS_KEY = "NorthernAmpAI_projects";
    const SELECTED_PROJECT_KEY = "NorthernAmpAI_selected_project";
    const SELECTED_CHAT_KEY = "NorthernAmpAI_selected_chat";
    
    const defaultProjects = [
      "General Engineering",
      "Transformers",
      "Protection & Control",
      "SCADA",
      "Power Studies",
      "Reports"
    ];

    let selectedProject = defaultProjects[0];
    let selectedChatId = null;
    let chats = {}; // { projectName: [ { id, title, conversation } ] }

    const chatWindow = document.getElementById("chatWindow");
    const promptInput = document.getElementById("prompt");
    const sendBtn = document.getElementById("sendBtn");
    const newChatBtn = document.getElementById("newChatBtn");
    const statusLine = document.getElementById("statusLine");
    const projectList = document.getElementById("projectList");
    const chatList = document.getElementById("chatList");
    const currentProjectTitle = document.getElementById("currentProjectTitle");
    const projectModal = document.getElementById("projectModal");
    const projectNameInput = document.getElementById("projectNameInput");
    const createProjectBtn = document.getElementById("createProjectBtn");
    const createChatBtn = document.getElementById("createChatBtn");
    const confirmBtn = document.getElementById("confirmBtn");
    const cancelBtn = document.getElementById("cancelBtn");

    let conversation = [];
    let projects = [];
    let isThinking = false;

    const createMessage = (role, text) => ({ role, text, timestamp: new Date().toISOString() });

    function renderProjects() {
      projectList.innerHTML = projects
        .map((project) => `
          <div class="project-item${project === selectedProject ? " active" : ""}" data-project="${escapeHtml(project)}">
            <div class="project-item-wrapper">
              <span>${project}</span>
              <button class="delete-project-btn" data-project="${escapeHtml(project)}" title="Delete project">×</button>
            </div>
          </div>
        `)
        .join("");
      
      document.querySelectorAll(".project-item").forEach(item => {
        item.addEventListener("click", () => {
          switchProject(item.dataset.project);
        });
      });

      document.querySelectorAll(".delete-project-btn").forEach(btn => {
        btn.addEventListener("click", (e) => {
          e.stopPropagation();
          deleteProject(btn.dataset.project);
        });
      });
    }

    function renderChats() {
      const projectChats = chats[selectedProject] || [];
      chatList.innerHTML = projectChats
        .map((chat) => `
          <div class="chat-item${chat.id === selectedChatId ? " active" : ""}" data-chat-id="${chat.id}">
            <div class="project-item-wrapper">
              <span>${escapeHtml(chat.title)}</span>
              <button class="delete-project-btn" data-chat-id="${chat.id}" title="Delete chat">×</button>
            </div>
          </div>
        `)
        .join("");
      
      document.querySelectorAll(".chat-item").forEach(item => {
        item.addEventListener("click", () => {
          switchChat(item.dataset.chatId);
        });
      });

      document.querySelectorAll(".delete-project-btn[data-chat-id]").forEach(btn => {
        btn.addEventListener("click", (e) => {
          e.stopPropagation();
          deleteChat(btn.dataset.chatId);
        });
      });
    }

    function renderConversation() {
      chatWindow.innerHTML = conversation
        .map((msg) => {
          const label = msg.role === "assistant" ? "NorthernAmpAI" : "You";
          const content = msg.role === "assistant" ? marked.parse(msg.text) : `<div>${escapeHtml(msg.text).replace(/\n/g, "<br />")}</div>`;
          return `
            <article class="message ${msg.role}">
              <span class="label">${label}</span>
              <div class="content">${content}</div>
            </article>
          `;
        })
        .join("");
      chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function getConversationKey(projectName) {
      return `${STORAGE_KEY_PREFIX}${projectName}`;
    }

    function getChatsKey(projectName) {
      return `${CHATS_KEY_PREFIX}${projectName}`;
    }

    function saveSelectedProject() {
      localStorage.setItem(SELECTED_PROJECT_KEY, selectedProject);
    }

    function saveSelectedChat() {
      localStorage.setItem(SELECTED_CHAT_KEY, selectedChatId);
    }

    function saveConversation() {
      if (!selectedProject || !selectedChatId) return;
      const projectChats = chats[selectedProject] || [];
      const chat = projectChats.find(c => c.id === selectedChatId);
      if (chat) {
        chat.conversation = conversation;
        saveChats();
      }
    }

    function saveChats() {
      if (!selectedProject) return;
      localStorage.setItem(getChatsKey(selectedProject), JSON.stringify(chats[selectedProject] || []));
    }

    function sanitizeForS3(value) {
      return value
        .toLowerCase()
        .trim()
        .replace(/[^a-z0-9-_\.]/g, "_")
        .replace(/_+/g, "_");
    }

    async function saveChatToS3(projectName, conversationData) {
      if (!projectName || !conversationData || conversationData.length === 0) {
        return false;
      }

      const timestamp = new Date().toISOString().replace(/[:.]/g, "-");
      const safeProject = sanitizeForS3(projectName);
      const fileName = `chat_${safeProject}_${timestamp}.json`;
      const payload = {
        projectName,
        savedAt: new Date().toISOString(),
        conversation: conversationData
      };

      try {
        const response = await fetch(PRESIGN_API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ projectName, fileName })
        });

        if (!response.ok) {
          throw new Error(`Presign request failed (${response.status})`);
        }

        const { uploadUrl, objectKey } = await response.json();
        const uploadResponse = await fetch(uploadUrl, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        if (!uploadResponse.ok) {
          throw new Error(`S3 upload failed (${uploadResponse.status})`);
        }

        return true;
      } catch (error) {
        console.warn("S3 save failed:", error);
        return false;
      }
    }

    function loadChats() {
      if (!selectedProject) return;
      const stored = localStorage.getItem(getChatsKey(selectedProject));
      if (stored) {
        try {
          chats[selectedProject] = JSON.parse(stored);
        } catch (error) {
          chats[selectedProject] = [];
        }
      } else {
        chats[selectedProject] = [];
      }
    }

    function loadCurrentChat() {
      if (!selectedProject || !selectedChatId) {
        conversation = [createMessage("assistant", "Hello! I'm NorthernAmpAI. Ask me about transformer sizing, protection design, SCADA, power studies, or engineering reports.")];
        return;
      }
      const projectChats = chats[selectedProject] || [];
      const chat = projectChats.find(c => c.id === selectedChatId);
      if (chat) {
        conversation = chat.conversation || [];
      } else {
        conversation = [createMessage("assistant", "Hello! I'm NorthernAmpAI. Ask me about transformer sizing, protection design, SCADA, power studies, or engineering reports.")];
      }
      if (!conversation || conversation.length === 0) {
        conversation = [createMessage("assistant", "Hello! I'm NorthernAmpAI. Ask me about transformer sizing, protection design, SCADA, power studies, or engineering reports.")];
      }
    }

    function switchProject(projectName) {
      if (!projectName || selectedProject === projectName) return;
      selectedProject = projectName;
      saveSelectedProject();
      loadChats();
      const projectChats = chats[selectedProject] || [];
      if (projectChats.length === 0) {
        // Create a default chat for new projects
        const chatId = Date.now().toString();
        const defaultChat = {
          id: chatId,
          title: "Welcome",
          conversation: [createMessage("assistant", "Hello! I'm NorthernAmpAI. Ask me about transformer sizing, protection design, SCADA, power studies, or engineering reports.")]
        };
        chats[selectedProject] = [defaultChat];
        saveChats();
        selectedChatId = chatId;
      } else if (projectChats.length > 0) {
        selectedChatId = projectChats[0].id;
      } else {
        selectedChatId = null;
      }
      saveSelectedChat();
      loadCurrentChat();
      currentProjectTitle.textContent = selectedProject;
      renderProjects();
      renderChats();
      renderConversation();
      updateStatus(`Switched to project: ${selectedProject}`);
    }

    function switchChat(chatId) {
      if (!chatId || selectedChatId === chatId) return;
      selectedChatId = chatId;
      saveSelectedChat();
      loadCurrentChat();
      renderChats();
      renderConversation();
      updateStatus(`Switched to chat: ${chats[selectedProject].find(c => c.id === chatId).title}`);
    }

    function loadSession() {
      const storedProjects = localStorage.getItem(PROJECTS_KEY);
      const storedSelectedProject = localStorage.getItem(SELECTED_PROJECT_KEY);
      const storedSelectedChat = localStorage.getItem(SELECTED_CHAT_KEY);

      if (storedProjects) {
        try {
          projects = JSON.parse(storedProjects);
        } catch (error) {
          projects = [...defaultProjects];
        }
      } else {
        projects = [...defaultProjects];
      }

      if (storedSelectedProject && projects.includes(storedSelectedProject)) {
        selectedProject = storedSelectedProject;
      } else if (projects.length > 0) {
        selectedProject = projects[0];
      }

      loadChats();
      const projectChats = chats[selectedProject] || [];
      if (storedSelectedChat && projectChats.some(c => c.id === storedSelectedChat)) {
        selectedChatId = storedSelectedChat;
      } else if (projectChats.length > 0) {
        selectedChatId = projectChats[0].id;
      } else {
        selectedChatId = null;
      }

      loadCurrentChat();
      currentProjectTitle.textContent = selectedProject;

      renderConversation();
      renderProjects();
      renderChats();
    }

    function updateStatus(text) {
      statusLine.textContent = text;
    }

    function openProjectModal() {
      projectModal.classList.add("active");
      projectNameInput.value = "";
      projectNameInput.focus();
    }

    function closeProjectModal() {
      projectModal.classList.remove("active");
    }

    function createProject(projectName) {
      const trimmedName = projectName.trim();
      if (!trimmedName) {
        alert("Please enter a project name.");
        return;
      }
      
      if (projects.includes(trimmedName)) {
        alert("A project with this name already exists.");
        projectNameInput.focus();
        return;
      }
      
      projects.push(trimmedName);
      chats[trimmedName] = [];
      saveProjects();
      switchProject(trimmedName);
      closeProjectModal();
    }

    function deleteProject(projectName) {
      if (projects.length === 1) {
        alert("At least one project must remain.");
        return;
      }

      if (confirm(`Are you sure you want to delete "${projectName}"? This will delete all chats in the project.`)) {
        projects = projects.filter(p => p !== projectName);
        delete chats[projectName];
        localStorage.removeItem(getChatsKey(projectName));
        if (selectedProject === projectName) {
          selectedProject = projects[0];
          saveSelectedProject();
          loadChats();
          const projectChats = chats[selectedProject] || [];
          selectedChatId = projectChats.length > 0 ? projectChats[0].id : null;
          saveSelectedChat();
          loadCurrentChat();
          currentProjectTitle.textContent = selectedProject;
        }
        saveProjects();
        renderProjects();
        renderChats();
        renderConversation();
      }
    }

    function createChat() {
      if (!selectedProject) return;
      const chatId = Date.now().toString();
      const newChat = {
        id: chatId,
        title: "New Chat",
        conversation: [createMessage("assistant", "New chat started. How can NorthernAmpAI support your engineering task?")]
      };
      if (!chats[selectedProject]) chats[selectedProject] = [];
      chats[selectedProject].push(newChat);
      saveChats();
      switchChat(chatId);
    }

    function deleteChat(chatId) {
      if (!selectedProject || !chatId) return;
      const projectChats = chats[selectedProject] || [];
      if (projectChats.length === 1) {
        alert("At least one chat must remain in the project.");
        return;
      }
      if (confirm("Are you sure you want to delete this chat?")) {
        chats[selectedProject] = projectChats.filter(c => c.id !== chatId);
        if (selectedChatId === chatId) {
          const remaining = chats[selectedProject];
          selectedChatId = remaining.length > 0 ? remaining[0].id : null;
          saveSelectedChat();
          loadCurrentChat();
        }
        saveChats();
        renderChats();
        renderConversation();
      }
    }

    async function sendQuestion() {
      if (isThinking) return;
      const question = promptInput.value.trim();
      if (!question) return;

      isThinking = true;
      promptInput.value = "";
      updateStatus("Sending question...");
      appendMessage("user", question);
      appendMessage("assistant", "Thinking...");

      try {
        const response = await fetch(API_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ question })
        });

        const payload = await response.json();
        let body = payload;
        if (payload.body) {
          try {
            body = JSON.parse(payload.body);
          } catch (_) {
            body = payload.body;
          }
        }

        const answer = body.answer || body.message || "No answer returned from the API.";
        replaceLastAssistantMessage(answer);
        saveConversation();
        const savedToS3 = await saveChatToS3(selectedProject, conversation);
        // Update chat title if it's the first user message
        if (selectedProject && selectedChatId) {
          const projectChats = chats[selectedProject] || [];
          const chat = projectChats.find(c => c.id === selectedChatId);
          if (chat && chat.title === "New Chat") {
            chat.title = question.length > 50 ? question.substring(0, 50) + "..." : question;
            saveChats();
            renderChats();
          }
        }
        if (savedToS3) {
          updateStatus("Answer received and chat saved to S3. Press Enter to ask the next question.");
        } else {
          updateStatus("Answer received. Chat saved locally; S3 upload failed.");
        }
      } catch (error) {
        replaceLastAssistantMessage(`Error: ${error.message}`);
        updateStatus("Unable to connect to the API. Check your network or endpoint.");
      } finally {
        isThinking = false;
      }
    }

    function appendMessage(role, text) {
      conversation.push(createMessage(role, text));
      saveConversation();
      renderConversation();
    }

    function replaceLastAssistantMessage(text) {
      for (let i = conversation.length - 1; i >= 0; i--) {
        if (conversation[i].role === "assistant") {
          conversation[i].text = text;
          break;
        }
      }
      renderConversation();
      saveConversation();
    }

    function startNewChat() {
      createChat();
    }

    // Event listeners
    sendBtn.addEventListener("click", sendQuestion);
    newChatBtn.addEventListener("click", startNewChat);
    createProjectBtn.addEventListener("click", openProjectModal);
    createChatBtn.addEventListener("click", createChat);
    confirmBtn.addEventListener("click", () => createProject(projectNameInput.value));
    cancelBtn.addEventListener("click", closeProjectModal);

    projectNameInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        createProject(projectNameInput.value);
      } else if (e.key === "Escape") {
        closeProjectModal();
      }
    });

    promptInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        sendQuestion();
      }
    });

    // Close modal when clicking outside
    projectModal.addEventListener("click", (e) => {
      if (e.target === projectModal) {
        closeProjectModal();
      }
    });

    loadSession();
  </script>
</body>
</html>
